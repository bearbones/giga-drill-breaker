name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        llvm-version: [18, 20]

    name: LLVM ${{ matrix.llvm-version }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install LLVM/Clang ${{ matrix.llvm-version }}
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            llvm-${{ matrix.llvm-version }}-dev \
            libclang-${{ matrix.llvm-version }}-dev \
            clang-${{ matrix.llvm-version }} \
            ninja-build

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_PREFIX_PATH=/usr/lib/llvm-${{ matrix.llvm-version }}

      - name: Build
        run: cmake --build build

      - name: Test
        run: cd build && ctest --output-on-failure
